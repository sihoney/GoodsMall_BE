# ==============================
# Order Service - 로컬 개발 환경 설정
# Config Server 미연결 시 사용되는 기본값
# ==============================

spring:
  application:
    name: order-service
  config:
    import:
      - "configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  cloud:
    config:
      fail-fast: true
      retry:
        initial-interval: 1000
        max-attempts: 20
        max-interval: 5000
        multiplier: 1.5
    openfeign:
      client:
        config:
          product-service:
            connectTimeout: 1000
            readTimeout: 2000
            loggerLevel: basic

  datasource:
    driver-class-name: org.postgresql.Driver
    url: "${DB_URL:jdbc:postgresql://localhost:5432/goods_mall}?currentSchema=order_service"
    username: ${DB_USER_NAME:postgres}
    password: ${DB_USER_PASSWORD:postgres}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # --- Kafka 설정 (로컬 기본값) ---
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# --- 서버 포트 ---
server:
  port: 8084

# --- Eureka 설정 (로컬 기본값) ---
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}

# --- Sweet Tracker API 설정 ---
sweet-tracker:
  api:
    key: ${SWEET_TRACKER_API_KEY:test-api-key}
    base-url: ${SWEET_TRACKER_API_BASE_URL:https://info.sweettracker.co.kr}

# --- 로깅 설정 (로컬: DEBUG) ---
logging:
  level:
    com.example.order: DEBUG
    org.hibernate.SQL: DEBUG