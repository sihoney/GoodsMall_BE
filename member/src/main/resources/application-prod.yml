spring:
  config:
    import: optional:file:.env[.properties]
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: member_service
        format_sql: false
      show-sql: false

server:
  port: 8083

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

apigateway:
  host: ${API_GATEWAY_HOST}

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    authorize-uri: ${KAKAO_AUTHORIZE_URI:https://kauth.kakao.com/oauth/authorize}
    token-uri: ${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
    user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
    redirect-uri: ${KAKAO_REDIRECT_URI}
    state-ttl: ${KAKAO_OAUTH_STATE_TTL:10m}
    pending-link-ttl: ${KAKAO_OAUTH_PENDING_LINK_TTL:10m}

jwt:
  secret: ${JWT_SECRET_KEY}
  issuer: member-service
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

eureka:
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP:127.0.0.1}
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_REGION:ap-northeast-2}
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
    profile-image-prefix: ${AWS_S3_PROFILE_IMAGE_PREFIX:members/profile}
    put-presign-expiration-seconds: ${AWS_S3_PUT_PRESIGN_EXPIRATION_SECONDS:300}
    get-presign-expiration-seconds: ${AWS_S3_GET_PRESIGN_EXPIRATION_SECONDS:600}

member:
  kafka:
    topic:
      signed-up: ${MEMBER_SIGNED_UP_TOPIC:member-signed-up}
  account-verification:
    expiration: ${ACCOUNT_VERIFICATION_EXPIRATION:5m}
    max-attempts: ${ACCOUNT_VERIFICATION_MAX_ATTEMPTS:5}
    max-resend-count: ${ACCOUNT_VERIFICATION_MAX_RESEND_COUNT:3}
    resend-cooldown: ${ACCOUNT_VERIFICATION_RESEND_COOLDOWN:30s}

logging:
  level:
    com.example.member: INFO
    org.hibernate.SQL: WARN
