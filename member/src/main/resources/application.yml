spring:
  application:
    name: member-service
  config:
    import:
      - "optional:file:member/.env[.properties]"
      - "optional:file:.env[.properties]"

  datasource:
    driver-class-name: org.postgresql.Driver
    url: "${DB_URL:jdbc:postgresql://localhost:5432/goods_mall}?currentSchema=member"
    username: ${DB_USER_NAME:postgres}
    password: ${DB_USER_PASSWORD:postgres}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: member

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:false}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: 8083

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

apigateway:
  host: ${API_GATEWAY_HOST:http://localhost:8080}

services:
  order:
    url: ${SERVICES_ORDER_URL:http://localhost:8084}
  payment:
    url: ${SERVICES_PAYMENT_URL:http://localhost:8082}
  product:
    url: ${SERVICES_PRODUCT_URL:http://localhost:8081}
  auction:
    url: ${SERVICES_AUCTION_URL:http://localhost:8090}
  settlement:
    url: ${SERVICES_SETTLEMENT_URL:http://localhost:8085}

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    authorize-uri: ${KAKAO_AUTHORIZE_URI:https://kauth.kakao.com/oauth/authorize}
    token-uri: ${KAKAO_TOKEN_URI:https://kauth.kakao.com/oauth/token}
    user-info-uri: ${KAKAO_USER_INFO_URI:https://kapi.kakao.com/v2/user/me}
    redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8083/api/auth/oauth/kakao/callback}
    frontend-callback-url: ${KAKAO_FRONTEND_CALLBACK_URL:http://localhost:5173/auth/kakao/callback}
    state-ttl: ${KAKAO_OAUTH_STATE_TTL:10m}
    pending-link-ttl: ${KAKAO_OAUTH_PENDING_LINK_TTL:10m}
    result-ttl: ${KAKAO_OAUTH_RESULT_TTL:3m}

jwt:
  secret: ${JWT_SECRET_KEY}
  issuer: member-service
  access-expiration: 3600000
  refresh-expiration: 604800000

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:todaylunch-local}
    region: ${AWS_REGION:ap-northeast-2}
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
    profile-image-prefix: members/profile
    put-presign-expiration-seconds: 300
    get-presign-expiration-seconds: 600

member:
  signup:
    require-email-verification: ${MEMBER_SIGNUP_REQUIRE_EMAIL_VERIFICATION:false}
  email:
    provider: ${EMAIL_PROVIDER:logging}
    from-address: ${MAIL_FROM:no-reply@todaylunch.local}
    from-name: ${MAIL_FROM_NAME:TodayLunch}
  email-verification:
    expiration: 24h
    frontend-confirm-url: ${EMAIL_VERIFICATION_FRONTEND_URL}
  password-reset:
    expiration: ${PASSWORD_RESET_EXPIRATION:30m}
    frontend-reset-url: ${PASSWORD_RESET_FRONTEND_URL:http://localhost:5173/password-reset}
  account-verification:
    expiration: 5m
    max-attempts: 5
    max-resend-count: 3
    resend-cooldown: 30s
    crypto:
      secret-key: ${ACCOUNT_VERIFICATION_SECRET_KEY}
logging:
  level:
    com.example.member: INFO
    org.hibernate.SQL: INFO
