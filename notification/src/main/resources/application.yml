# ==============================
# Notification Service - 로컬 개발 환경 설정
# Config Server 미연결 시 사용하는 기본값
# ==============================

spring:
  application:
    name: notification-service

  # --- 데이터베이스 설정 (로컬 기본값) ---
  datasource:
    driver-class-name: org.postgresql.Driver
    url: "${DB_URL:jdbc:postgresql://localhost:5432/goods_mall}?currentSchema=notification"
    username: ${DB_USER_NAME:postgres}
    password: ${DB_USER_PASSWORD:postgres}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: notification

  # --- Kafka 설정 (로컬 기본값) ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# --- 서버 포트 ---
server:
  port: 8087

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# --- Notification Kafka Consumer / Topic ---
notification:
  kafka:
    consumer-groups:
      member-signed-up: notification-service
      order-created: notification-service
      order-canceled: notification-service
      auto-purchase-confirmed: notification-service
      order-payment-result: notification-service
      seller-settlement-payout-result: notification-service
    retry:
      initial-interval-ms: 1000
      max-attempts: 3

logging:
  level:
    com.example.notification: INFO
    org.hibernate.SQL: INFO
