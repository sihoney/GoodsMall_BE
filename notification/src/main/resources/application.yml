# ==============================
# Notification Service - 로컬 개발 환경 설정
# Config Server 미연결 시 사용하는 기본값
# ==============================

spring:
  application:
    name: notification-service
  config:
    import:
      - "configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  cloud:
    config:
      fail-fast: true
      retry:
        initial-interval: 1000
        max-attempts: 20
        max-interval: 5000
        multiplier: 1.5

  # --- 데이터베이스 설정 (로컬 기본값) ---
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/goods_mall?currentSchema=notification
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: notification

  # --- Kafka 설정 (로컬 기본값) ---
  kafka:
    bootstrap-servers: localhost:9092

# --- 서버 포트 ---
server:
  port: 8087

# --- Eureka 설정 (로컬 기본값) ---
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}

# --- Springdoc 설정 ---
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# --- Notification Kafka Consumer / Topic ---
notification:
  kafka:
    consumer-groups:
      member-signed-up: notification-service
    topics:
      member-signed-up: member-signed-up

logging:
  level:
    com.example.notification: DEBUG
    org.hibernate.SQL: DEBUG