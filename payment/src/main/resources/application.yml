# ==============================
# Payment Service - 로컬 개발 환경 설정
# Config Server 미연결 시 사용되는 기본값
# ==============================

spring:
  application:
    name: payment-service

  # --- 데이터베이스 설정 (로컬 기본값) ---
  datasource:
    driver-class-name: org.postgresql.Driver
    url: "${DB_URL:jdbc:postgresql://localhost:5432/goods_mall}?currentSchema=payment"
    username: ${DB_USER_NAME:postgres}
    password: ${DB_USER_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: payment

  # --- Kafka 설정 (로컬 기본값) ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.payment.infrastructure.messaging.kafka.contract

# --- 서버 포트 ---
server:
  port: 8082

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# --- Toss Payments 설정 (로컬 기본값) ---
toss:
  payments:
    base-url: ${TOSS_PAYMENTS_BASE_URL:https://api.tosspayments.com}
    client-key: ${TOSS_PAYMENTS_CLIENT_KEY:test-client-key}
    secret-key: ${TOSS_PAYMENTS_SECRET_KEY:test-secret-key}
    success-url: ${TOSS_PAYMENTS_SUCCESS_URL:http://localhost:3000/payments/toss/success}
    fail-url: ${TOSS_PAYMENTS_FAIL_URL:http://localhost:3000/payments/toss/fail}
    widget-enabled: ${TOSS_PAYMENTS_WIDGET_ENABLED:true}

services:
  order:
    url: ${SERVICES_ORDER_URL:http://localhost:8084}

# --- Payment Kafka Topic/Consumer Group 설정 (로컬 기본값) ---
payment:
  withdraw:
    crypto:
      secret-key: ${PAYMENT_WITHDRAW_CRYPTO_SECRET_KEY:local-dev-payment-withdraw-secret-key}
  kafka:
    topics:
      member-created: member-signed-up
      order-payment-result: payment.order-payment-result
      order-purchase-confirmed: order.purchase-confirmed
      settlement-candidate-created: payment.settlement-candidate-created
      settlement-payout-requested: settlement.seller-payout-requested
      settlement-payout-result: payment.seller-payout-result
    consumer-groups:
      member-created: payment-service
      order-purchase-confirmed: payment-service
      settlement-payout-requested: payment-service
    retry:
      settlement-payout-requested:
        dlq-topic: settlement.seller-payout-requested.dlq
        initial-interval-ms: 1000
        multiplier: 2.0
        max-interval-ms: 10000
        max-retries: 3
# --- 로깅 설정 (로컬: DEBUG) ---
logging:
  level:
    com.example.payment: DEBUG
    org.hibernate.SQL: DEBUG
