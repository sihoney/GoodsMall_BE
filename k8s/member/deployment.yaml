apiVersion: apps/v1
kind: Deployment
metadata:
  name: member
  namespace: goods-mall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: member
  template:
    metadata:
      labels:
        app: member
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: member
          image: ghcr.io/prgrms-be-adv-devcourse/beadv5_2_todaylunchmenu_be/member:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: common-config
            - secretRef:
                name: common-secret
            - configMapRef:
                name: member-config
            - secretRef:
                name: member-secret
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            failureThreshold: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
