apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: goods-mall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      nodeSelector:
        role: infra
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: cart
          image: ghcr.io/prgrms-be-adv-devcourse/beadv5_2_todaylunchmenu_be/cart:latest
          ports:
            - containerPort: 8086
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms256m -Xmx512m -Duser.timezone=Asia/Seoul"
          envFrom:
            - configMapRef:
                name: common-config
            - secretRef:
                name: common-secret
          startupProbe:
            tcpSocket:
              port: 8086
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8086
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
