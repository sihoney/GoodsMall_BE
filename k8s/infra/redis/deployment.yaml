apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: goods-mall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          ports:
            - containerPort: 6379
          startupProbe:
            exec:
              command: [ "redis-cli", "ping" ]
            failureThreshold: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: [ "redis-cli", "ping" ]
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: [ "redis-cli", "ping" ]
            initialDelaySeconds: 5
            periodSeconds: 5