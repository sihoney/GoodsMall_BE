spring:
  application:
    name: auction-service

  datasource:
    driver-class-name: org.postgresql.Driver
    url: "${DB_URL:jdbc:postgresql://localhost:5432/goods_mall}?currentSchema=auction"
    username: ${DB_USER_NAME:postgres}
    password: ${DB_USER_PASSWORD:postgres}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: auction

  # --- Kafka 설정 (로컬 기본값) ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: auction-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

server:
  port: 8090

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY:test}
      secret-key: ${AWS_SECRET_KEY:test}
    region:
      static: ap-northeast-2
    s3:
      bucket: ${AWS_S3_BUCKET:test-bucket}

  # --- Elasticsearch 설정 (로컬 기본값) ---
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

logging:
  level:
    com.todaylunch.auction: DEBUG
    org.hibernate.SQL: DEBUG

services:
  payment:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8082}

