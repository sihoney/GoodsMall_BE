spring:
  application:
    name: auction-service

  datasource:
    driver-class-name: org.postgresql.Driver
    url: "${DB_URL:jdbc:postgresql://localhost:5432/goods_mall}?currentSchema=auction"
    username: ${DB_USER_NAME:postgres}
    password: ${DB_USER_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8090

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY:test}
      secret-key: ${AWS_SECRET_KEY:test}
    region:
      static: ap-northeast-2
    s3:
      bucket: ${AWS_S3_BUCKET:test-bucket}

  # --- Elasticsearch 설정 (로컬 기본값) ---
  elasticsearch:
    uris: ${ELASTICSEARCH_URI:http://localhost:9200}

  # --- Kafka 설정 (로컬 기본값) ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

logging:
  level:
    com.todaylunch.auction: DEBUG
    org.hibernate.SQL: DEBUG

auction:
  kafka:
    topic:
      auction-changed: auction.changed
