spring:
  application:
    name: ai-service
  config:
    import:
      - "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  cloud:
    config:
      fail-fast: false
      retry:
        initial-interval: 1000
        max-attempts: 20
        max-interval: 5000
        multiplier: 1.5
  datasource:
    driver-class-name: org.postgresql.Driver
    url: "${DB_URL:jdbc:postgresql://localhost:5432/goods_mall}?currentSchema=ai"
    username: ${DB_USER_NAME:postgres}
    password: ${DB_USER_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: ai
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8088

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

ai:
  product-api:
    base-url: ${AI_PRODUCT_API_BASE_URL:http://localhost:8081}
    page-size: ${AI_PRODUCT_API_PAGE_SIZE:200}
  embedding:
    model: text-embedding-3-small
    openai-api-key: ${OPENAI_API_KEY:}
    openai-base-url: ${PROJECT_OPENAI_BASE_URL:https://api.openai.com}
  recommendation:
    rerank:
      enabled: ${AI_RECOMMENDATION_RERANK_ENABLED:false}
      model: ${AI_RECOMMENDATION_RERANK_MODEL:gpt-5.4-nano}
      openai-api-key: ${OPENAI_API_KEY:}
      openai-base-url: ${PROJECT_OPENAI_BASE_URL:https://api.openai.com}
      temperature: ${AI_RECOMMENDATION_RERANK_TEMPERATURE:0.0}
      connect-timeout-ms: ${AI_RECOMMENDATION_RERANK_CONNECT_TIMEOUT_MS:1500}
      read-timeout-ms: ${AI_RECOMMENDATION_RERANK_READ_TIMEOUT_MS:2500}
  product-draft:
    assist:
      enabled: ${AI_PRODUCT_DRAFT_ASSIST_ENABLED:false}
      model: ${AI_PRODUCT_DRAFT_ASSIST_MODEL:gpt-5.4-nano}
      openai-api-key: ${OPENAI_API_KEY:}
      openai-base-url: ${PROJECT_OPENAI_BASE_URL:https://api.openai.com}
      temperature: ${AI_PRODUCT_DRAFT_ASSIST_TEMPERATURE:0.2}
      lock-ttl-seconds: ${AI_PRODUCT_DRAFT_ASSIST_LOCK_TTL_SECONDS:30}
      result-ttl-seconds: ${AI_PRODUCT_DRAFT_ASSIST_RESULT_TTL_SECONDS:60}
      wait-timeout-ms: ${AI_PRODUCT_DRAFT_ASSIST_WAIT_TIMEOUT_MS:2000}
      poll-interval-ms: ${AI_PRODUCT_DRAFT_ASSIST_POLL_INTERVAL_MS:150}
      connect-timeout-ms: ${AI_PRODUCT_DRAFT_ASSIST_CONNECT_TIMEOUT_MS:3000}
      read-timeout-ms: ${AI_PRODUCT_DRAFT_ASSIST_READ_TIMEOUT_MS:10000}
  auction-price-recommendation:
    enabled: ${AI_AUCTION_PRICE_RECOMMENDATION_ENABLED:true}
    model: ${AI_AUCTION_PRICE_RECOMMENDATION_MODEL:gpt-5.4-nano}
    openai-api-key: ${OPENAI_API_KEY:}
    openai-base-url: ${PROJECT_OPENAI_BASE_URL:https://api.openai.com}
    temperature: ${AI_AUCTION_PRICE_RECOMMENDATION_TEMPERATURE:0.2}
    connect-timeout-ms: ${AI_AUCTION_PRICE_RECOMMENDATION_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${AI_AUCTION_PRICE_RECOMMENDATION_READ_TIMEOUT_MS:8000}
  cache:
    recommendation-ttl-seconds: ${AI_RECOMMENDATION_CACHE_TTL_SECONDS:600}
  event:
    idempotency-ttl-seconds: ${AI_EVENT_IDEMPOTENCY_TTL_SECONDS:259200}
    product:
      consumer-group: ${AI_PRODUCT_EVENT_CONSUMER_GROUP:ai-product-embedding-group}
      topics:
        created: ${AI_PRODUCT_CREATED_TOPIC:product.created}
        updated: ${AI_PRODUCT_UPDATED_TOPIC:product.updated}
        deleted: ${AI_PRODUCT_DELETED_TOPIC:product.deleted}

logging:
  level:
    com.example.ai: DEBUG
