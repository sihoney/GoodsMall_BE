server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: optional:file:gateway/.env[.properties],optional:file:.env[.properties]
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations: #
              "[/**]":
                allowedOrigins:
                  - http://localhost:5173
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
          routes:
            - id: member-auth-service
              uri: lb://member-service
              predicates:
                - Path=/api/auth/**

            - id: member-service-v1
              uri: lb://member-service
              predicates:
                - Path=/api/members/**

            - id: member-seller-service
              uri: lb://member-service
              predicates:
                - Path=/api/sellers/**

            - id: member-report-service
              uri: lb://member-service
              predicates:
                - Path=/api/member-reports/**

            - id: member-admin-report-service
              uri: lb://member-service
              predicates:
                - Path=/api/admin/member-reports/**

            - id: member-admin-restriction-service
              uri: lb://member-service
              predicates:
                - Path=/api/admin/member-restrictions/**

            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/products/**

            - id: category-service
              uri: lb://product-service
              predicates:
                - Path=/api/category/**

            - id: cart-service
              uri: lb://cart-service
              predicates:
                - Path=/api/carts/**

            - id: category-service
              uri: lb://product-service
              predicates:
                - Path=/api/categories/**

            - id: cart-service
              uri: lb://cart-service
              predicates:
                - Path=/api/carts/**

            - id: wish-service
              uri: lb://cart-service
              predicates:
                - Path=/api/wishes/**

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**

            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**

            - id: settlement-service
              uri: lb://settlement-service
              predicates:
                - Path=/api/settlements/**

            - id: ai-service
              uri: lb://ai-service
              predicates:
                - Path=/api/ai/**

            - id: member-service-docs
              uri: lb://member-service
              predicates:
                - Path=/swagger/member/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: payment-service-docs
              uri: lb://payment-service
              predicates:
                - Path=/swagger/payment/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: settlement-service-docs
              uri: lb://settlement-service
              predicates:
                - Path=/swagger/settlement/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: product-service-docs
              uri: lb://product-service
              predicates:
                - Path=/swagger/product/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: cart-service-docs
              uri: lb://cart-service
              predicates:
                - Path=/swagger/cart/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: order-service-docs
              uri: lb://order-service
              predicates:
                - Path=/swagger/order/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**

            - id: notification-service-docs
              uri: lb://notification-service
              predicates:
                - Path=/swagger/notification/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: ai-service-docs
              uri: lb://ai-service
              predicates:
                - Path=/swagger/ai/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

eureka:
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP:127.0.0.1}
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET_KEY}
  issuer: member-service

gateway:
  auth:
    jwt-validation-enabled: ${GATEWAY_JWT_VALIDATION_ENABLED:true}
    public-paths:
      - /api/auth
      - /api/auth/login
      - /api/auth/refresh
      - /api/auth/email-verifications
      - /api/auth/email-verifications/confirm
      - /api/auth/profile-images/presign
      - /swagger/**
      - /swagger-ui.html
    public-rules:
      - methods: [GET]
        pattern: /api/category/**
      - methods: [GET]
        pattern: /api/categories/**
      - methods: [GET]
        pattern: /api/products/**
      - methods: [GET]
        pattern: /api/ai/**
    role-rules:
      - methods: [GET, PUT]
        pattern: /api/members/me
        allowed-roles: [USER, SELLER, ADMIN]
      - methods: [POST]
        pattern: /api/auth/logout/**
        allowed-roles: [USER, SELLER, ADMIN]
      - methods: [POST, GET]
        pattern: /api/member-reports/**
        allowed-roles: [USER, SELLER, ADMIN]
      - methods: [GET, PATCH]
        pattern: /api/notifications/**
        allowed-roles: [USER, SELLER, ADMIN]
      - methods: [GET, POST, PUT, DELETE]
        pattern: /api/carts/**
        allowed-roles: [USER, SELLER, ADMIN]
      - methods: [GET, POST, DELETE]
        pattern: /api/wishes/**
        allowed-roles: [USER, SELLER, ADMIN]
      - methods: [GET, POST]
        pattern: /api/orders/**
        allowed-roles: [USER, SELLER, ADMIN]
      - methods: [GET, POST]
        pattern: /api/payments/**
        allowed-roles: [USER, SELLER, ADMIN]
      - methods: [POST, GET, PUT]
        pattern: /api/sellers/**
        allowed-roles: [SELLER, ADMIN]
      - methods: [POST, PUT, PATCH, DELETE]
        pattern: /api/products/**
        allowed-roles: [SELLER, ADMIN]
      - methods: [POST, GET]
        pattern: /api/settlements/**
        allowed-roles: [SELLER, ADMIN]
      - methods: [GET, PATCH]
        pattern: /api/admin/member-reports/**
        allowed-roles: [ADMIN]
      - methods: [POST, PATCH, GET]
        pattern: /api/admin/member-restrictions/**
        allowed-roles: [ADMIN]
      - methods: [POST]
        pattern: /api/ai/admin/**
        allowed-roles: [ADMIN]

logging:
  level:
    com.todaylunch.gateway: INFO
    org.springframework.cloud.gateway: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: member-service
        url: /swagger/member/v3/api-docs
      - name: payment-service
        url: /swagger/payment/v3/api-docs
      - name: settlement-service
        url: /swagger/settlement/v3/api-docs
      - name: product-service
        url: /swagger/product/v3/api-docs
      - name: cart-service
        url: /swagger/cart/v3/api-docs
      - name: order-service
        url: /swagger/order/v3/api-docs
      - name: notification-service
        url: /swagger/notification/v3/api-docs
      - name: ai-service
        url: /swagger/ai/v3/api-docs
