server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: optional:file:gateway/.env[.properties],optional:file:.env[.properties]
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: member-auth-service
              uri: lb://member-service
              predicates:
                - Path=/api/v1/auth/**

            - id: member-service-v1
              uri: lb://member-service
              predicates:
                - Path=/api/v1/members/**

            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/products/**

            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**

            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**

            - id: settlement-service
              uri: lb://settlement-service
              predicates:
                - Path=/api/settlements/**

            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**

eureka:
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ${JWT_SECRET_KEY}
  issuer: member-service

logging:
  level:
    com.todaylunch.gateway: INFO
    org.springframework.cloud.gateway: INFO
