server:
  port: 8761

spring:
  application:
    name: discovery-service

eureka:
  client:
    register-with-eureka: false
    ## 이 어플리케이션은 Eureka 서버에 등록 하지 X -> Product는 Eureka에 등록해야 하니 true
    fetch-registry: false
    ## 이 어플리케이션은 서비스 목록을 가지고 오지 X -> Product와 같은 도메인들은 true

  server:
    enable-self-preservation: false
  ## 자기보호모드 - false => 네트워크 장애로 많은 서비스가 한꺼번에 등록 해제 되는것을 방지 기능
  ## 개발시에는 자주 껐다키므로 false 운영시는 true
