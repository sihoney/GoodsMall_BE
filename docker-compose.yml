version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: goods-mall-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - goods_mall_postgres_data:/var/lib/postgresql/data

volumes:
  goods_mall_postgres_data: