services:
  postgres:
    image: postgres:18
    container_name: goods-mall-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - goods_mall_postgres_data:/var/lib/postgresql/data
      - ./docs/settlement-payment/sql/00_schema_create.sql:/docker-entrypoint-initdb.d/00_schema_create.sql:ro
      - ./docs/settlement-payment/sql/01_ddl_payment.sql:/docker-entrypoint-initdb.d/01_ddl_payment.sql:ro
      - ./docs/settlement-payment/sql/02_ddl_settlement.sql:/docker-entrypoint-initdb.d/02_ddl_settlement.sql:ro
      - ./docs/settlement-payment/sql/03_seed_data.sql:/docker-entrypoint-initdb.d/03_seed_data.sql:ro

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: goods-mall-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: goods-mall-kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: goods-mall-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8089:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"

  discovery:
    build:
      context: .
      dockerfile: discovery/Dockerfile
    container_name: goods-mall-discovery
    ports:
      - "8761:8761"

  payment:
    build:
      context: .
      dockerfile: payment/Dockerfile
    container_name: goods-mall-payment
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL}
      DB_USER_NAME: ${DB_USER_NAME}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      TOSS_PAYMENTS_BASE_URL: ${TOSS_PAYMENTS_BASE_URL}
      TOSS_PAYMENTS_CLIENT_KEY: ${TOSS_PAYMENTS_CLIENT_KEY}
      TOSS_PAYMENTS_SECRET_KEY: ${TOSS_PAYMENTS_SECRET_KEY}
      TOSS_PAYMENTS_SUCCESS_URL: ${TOSS_PAYMENTS_SUCCESS_URL}
      TOSS_PAYMENTS_FAIL_URL: ${TOSS_PAYMENTS_FAIL_URL}
      TOSS_PAYMENTS_WIDGET_ENABLED: ${TOSS_PAYMENTS_WIDGET_ENABLED}
    ports:
      - "8082:8082"

  settlement:
    build:
      context: .
      dockerfile: settlement/Dockerfile
    container_name: goods-mall-settlement
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_URL: ${DB_URL}
      DB_USER_NAME: ${DB_USER_NAME}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
    ports:
      - "8085:8085"

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: goods-mall-gateway
    depends_on:
      discovery:
        condition: service_started
      payment:
        condition: service_started
      settlement:
        condition: service_started
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_IP: ${EUREKA_INSTANCE_IP}
    ports:
      - "8080:8080"

  # Placeholder services for other modules.
  # These are not part of the current payment/settlement verification scope.
  # Use `docker compose --profile future up --build` after each module is ready.

  member:
    profiles: ["future"]
    build:
      context: .
      dockerfile: member/Dockerfile
    container_name: goods-mall-member
    depends_on:
      discovery:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_IP: ${EUREKA_INSTANCE_IP}
      # TODO(member): add module-specific DB/env values if member adopts compose runtime.
      # TODO(member): add REDIS_HOST/REDIS_PORT or remove if not needed in docker runtime.
      # TODO(member): confirm JWT and Kafka env names used by member application.yml.
    ports:
      - "8081:8081"

  product:
    profiles: ["future"]
    build:
      context: .
      dockerfile: product/Dockerfile
    container_name: goods-mall-product
    depends_on:
      discovery:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_IP: ${EUREKA_INSTANCE_IP}
      # TODO(product): add product DB/env values.
      # TODO(product): confirm whether kafka is required at runtime.
    ports:
      - "8084:8084"

  order:
    profiles: ["future"]
    build:
      context: .
      dockerfile: order/Dockerfile
    container_name: goods-mall-order
    depends_on:
      discovery:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_IP: ${EUREKA_INSTANCE_IP}
      # TODO(order): add order DB/env values.
      # TODO(order): confirm payment/product/member integration env requirements.
    ports:
      - "8086:8086"

  notification:
    profiles: ["future"]
    build:
      context: .
      dockerfile: notification/Dockerfile
    container_name: goods-mall-notification
    depends_on:
      discovery:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
      EUREKA_INSTANCE_IP: ${EUREKA_INSTANCE_IP}
      # TODO(notification): add notification DB/env values.
      # TODO(notification): confirm email/sse/redis external settings if needed.
    ports:
      - "8087:8087"

volumes:
  goods_mall_postgres_data:
