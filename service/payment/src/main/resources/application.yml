# ==============================
# Payment Service - 로컬 개발 환경 설정
# Config Server 미연결 시 사용되는 기본값
# ==============================

spring:
  application:
    name: payment-service

  # --- 데이터베이스 설정 (로컬 기본값) ---
  datasource:
    driver-class-name: org.postgresql.Driver
    url: "${DB_URL:jdbc:postgresql://localhost:5432/goods_mall}?currentSchema=payment"
    username: ${DB_USER_NAME:postgres}
    password: ${DB_USER_PASSWORD:postgres}
    hikari:
      minimum-idle: 2
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:5}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: payment

  # --- Kafka 설정 (로컬 기본값) ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.payment.infrastructure.messaging.kafka.contract

# --- 서버 포트 ---
server:
  port: 8082

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# --- Toss Payments 설정 (로컬 기본값) ---
toss:
  payments:
    base-url: https://api.tosspayments.com
    client-key: ${TOSS_PAYMENTS_CLIENT_KEY:test-client-key}
    secret-key: ${TOSS_PAYMENTS_SECRET_KEY:test-secret-key}
    success-url: ${FRONTEND_BASE_URL:http://localhost:5173}/payments/toss/success
    fail-url: ${FRONTEND_BASE_URL:http://localhost:5173}/payments/toss/fail
    widget-enabled: true

services:
  order:
    url: ${SERVICES_ORDER_URL:http://localhost:8084}

# --- Payment 설정 (로컬 기본값) ---
payment:
  withdraw:
    crypto:
      secret-key: ${PAYMENT_WITHDRAW_CRYPTO_SECRET_KEY:local-dev-payment-withdraw-secret-key}
# --- 로깅 설정 (로컬: DEBUG) ---
# TODO: Split log levels by environment later (local dev can use DEBUG, production should default to INFO/WARN).
logging:
  level:
    com.example.payment: DEBUG
