server:
  port: 8080

spring:
  application:
    name: gateway-service
  config:
    import: optional:file:service/gateway/.env[.properties],optional:file:.env[.properties],optional:classpath:gateway-auth-rules.yml,optional:file:/config/gateway-auth-rules.yml
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations: #
              "[/**]":
                allowedOrigins:
                  - http://localhost:5173
                  - https://goods-mall-fe.vercel.app
                  - https://www.goods-mall.shop
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
          routes:
            - id: member-auth-service
              uri: ${MEMBER_SERVICE_URL:http://member:8083}
              predicates:
                - Path=/api/auth/**

            - id: member-service-v1
              uri: ${MEMBER_SERVICE_URL:http://member:8083}
              predicates:
                - Path=/api/members/**

            - id: member-seller-service
              uri: ${MEMBER_SERVICE_URL:http://member:8083}
              predicates:
                - Path=/api/sellers/**

            - id: member-report-service
              uri: ${MEMBER_SERVICE_URL:http://member:8083}
              predicates:
                - Path=/api/member-reports/**

            - id: member-admin-report-service
              uri: ${MEMBER_SERVICE_URL:http://member:8083}
              predicates:
                - Path=/api/admin/member-reports/**

            - id: member-admin-restriction-service
              uri: ${MEMBER_SERVICE_URL:http://member:8083}
              predicates:
                - Path=/api/admin/member-restrictions/**

            - id: product-admin-service
              uri: ${PRODUCT_SERVICE_URL:http://product:8081}
              predicates:
                - Path=/api/admin/products/**

            - id: product-service
              uri: ${PRODUCT_SERVICE_URL:http://product:8081}
              predicates:
                - Path=/api/products/**

            - id: category-service
              uri: ${PRODUCT_SERVICE_URL:http://product:8081}
              predicates:
                - Path=/api/categories/**

            - id: cart-service
              uri: ${CART_SERVICE_URL:http://cart:8086}
              predicates:
                - Path=/api/carts/**

            - id: wish-service
              uri: ${CART_SERVICE_URL:http://cart:8086}
              predicates:
                - Path=/api/wishes/**

            - id: order-service
              uri: ${ORDER_SERVICE_URL:http://order:8084}
              predicates:
                - Path=/api/orders/**

            - id: order-delivery-service
              uri: ${ORDER_SERVICE_URL:http://order:8084}
              predicates:
                - Path=/api/deliveries/**

            - id: order-return-request-service
              uri: ${ORDER_SERVICE_URL:http://order:8084}
              predicates:
                - Path=/api/return-requests/**

            - id: payment-service
              uri: ${PAYMENT_SERVICE_URL:http://payment:8082}
              predicates:
                - Path=/api/payments/**

            - id: settlement-service
              uri: ${SETTLEMENT_SERVICE_URL:http://settlement:8085}
              predicates:
                - Path=/api/settlements/**

            - id: ai-service
              uri: ${AI_SERVICE_URL:http://ai:8088}
              predicates:
                - Path=/api/ai/**

            - id: auction-service
              uri: ${AUCTION_SERVICE_URL:http://auction:8090}
              predicates:
                - Path=/api/auctions/**

            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://notification:8087}
              predicates:
                - Path=/api/notifications/**

            - id: member-service-docs
              uri: ${MEMBER_SERVICE_URL:http://member:8083}
              predicates:
                - Path=/swagger/member/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: payment-service-docs
              uri: ${PAYMENT_SERVICE_URL:http://payment:8082}
              predicates:
                - Path=/swagger/payment/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: settlement-service-docs
              uri: ${SETTLEMENT_SERVICE_URL:http://settlement:8085}
              predicates:
                - Path=/swagger/settlement/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: product-service-docs
              uri: ${PRODUCT_SERVICE_URL:http://product:8081}
              predicates:
                - Path=/swagger/product/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: cart-service-docs
              uri: ${CART_SERVICE_URL:http://cart:8086}
              predicates:
                - Path=/swagger/cart/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: order-service-docs
              uri: ${ORDER_SERVICE_URL:http://order:8084}
              predicates:
                - Path=/swagger/order/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: notification-service-docs
              uri: ${NOTIFICATION_SERVICE_URL:http://notification:8087}
              predicates:
                - Path=/swagger/notification/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

            - id: ai-service-docs
              uri: ${AI_SERVICE_URL:http://ai:8088}
              predicates:
                - Path=/swagger/ai/v3/api-docs
              filters:
                - SetPath=/v3/api-docs

jwt:
  secret: ${JWT_SECRET_KEY}
  issuer: member-service

# TODO: Split log levels by environment later (local dev can use DEBUG, production should default to INFO/WARN).
logging:
  level:
    com.todaylunch.gateway: INFO
    org.springframework.cloud.gateway: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: member-service
        url: /swagger/member/v3/api-docs
      - name: payment-service
        url: /swagger/payment/v3/api-docs
      - name: settlement-service
        url: /swagger/settlement/v3/api-docs
      - name: product-service
        url: /swagger/product/v3/api-docs
      - name: cart-service
        url: /swagger/cart/v3/api-docs
      - name: order-service
        url: /swagger/order/v3/api-docs
      - name: notification-service
        url: /swagger/notification/v3/api-docs
      - name: ai-service
        url: /swagger/ai/v3/api-docs
