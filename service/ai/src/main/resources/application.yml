spring:
  application:
    name: ai-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: "${DB_URL:jdbc:postgresql://localhost:5432/goods_mall}?currentSchema=ai,public"
    username: ${DB_USER_NAME:postgres}
    password: ${DB_USER_PASSWORD:postgres}
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        default_schema: ai
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 30MB

server:
  port: 8088

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

ai:
  product-api:
    base-url: ${AI_PRODUCT_API_BASE_URL:http://localhost:8081}
    page-size: 200
  embedding:
    model: text-embedding-3-small
    openai-api-key: ${OPENAI_API_KEY:}
    openai-base-url: https://api.openai.com
  recommendation:
    rerank:
      enabled: true
      model: gpt-5.4-nano
      openai-api-key: ${OPENAI_API_KEY:}
      openai-base-url: https://api.openai.com
      temperature: 0.0
      connect-timeout-ms: 1500
      read-timeout-ms: 2500
  product-draft:
    assist:
      enabled: true
      model: gpt-5.4-nano
      openai-api-key: ${OPENAI_API_KEY:}
      openai-base-url: https://api.openai.com
      temperature: 0.2
      lock-ttl-seconds: 30
      result-ttl-seconds: 60
      wait-timeout-ms: 2000
      poll-interval-ms: 150
      connect-timeout-ms: 3000
      read-timeout-ms: 10000
  auction-price-recommendation:
    enabled: true
    model: gpt-5.4-nano
    openai-api-key: ${OPENAI_API_KEY:}
    openai-base-url: https://api.openai.com
    temperature: 0.2
    connect-timeout-ms: 3000
    read-timeout-ms: 8000
  cache:
    recommendation-ttl-seconds: 600
    user-recommendation-ttl-seconds: 3600
  event:
    idempotency-ttl-seconds: 259200
  kafka:
    retry:
      initial-interval-ms: 1000
      max-attempts: 3
      multiplier: 2.0
      max-interval-ms: 5000

logging:
  level:
    com.example.ai: DEBUG
