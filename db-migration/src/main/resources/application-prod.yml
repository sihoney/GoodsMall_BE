spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: db-migration
  main:
    web-application-type: none
  datasource:
    url: ${DB_URL}
    username: ${DB_USER_NAME}
    password: ${DB_USER_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations:
      - classpath:db/migration
    # `schemas` is intentionally omitted in the current runner.
    # We want schema creation to start from versioned migrations such as V1/V2,
    # rather than having Flyway pre-create managed schemas and history tables.

app:
  seed:
    enabled: ${DB_SEED_ENABLED:false}
    locations: ${DB_SEED_LOCATIONS:}

logging:
  level:
    org.flywaydb: INFO
