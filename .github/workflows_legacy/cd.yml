name: cd

on:
  push:
    branches:
      - main
    paths:
      - "service/member/**"
      - "service/product/**"
      - "service/order/**"
      - "service/payment/**"
      - "service/notification/**"
      - "service/settlement/**"
      - "service/cart/**"
      - "service/gateway/**"
      - "db-migration/**"
      - "service/ai/**"
      - "service/auction/**"
      - "infra/k8s/**"

# 중복 배포 방지 및 이전 배포 자동 취소(새치기 허용)
concurrency:                                        # 동시성 제어
  group: ${{ github.workflow }}-${{ github.ref }}   # "같은 워크플로우 파일 & 같은 브랜치(ref)"에서 실행되는 배포들을 하나의 그룹으로 묶겠다.
  cancel-in-progress: true

# Runner가 내 Github 계정의 데이터에 어디까지 접근할 수 있는지 권한의 범위를 제한하는 보안 설정
permissions:
  contents: read  # 내 소스 코드
  packages: write # 빌드된 결과물(패키지)

env:
  IMAGE_PREFIX: ghcr.io/prgrms-be-adv-devcourse/beadv5_2_todaylunchmenu_be

jobs:
  detect-changes:
    name: detect changed modules
    runs-on: ubuntu-latest

    # outputs: 다음 Job들에게 전달해 줄 결과 데이터 리스트 정의
    outputs:
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      services: ${{ steps.set-services.outputs.services }}
      migration_changed: ${{ steps.set-flags.outputs.migration_changed }}
      k8s_changed: ${{ steps.set-flags.outputs.k8s_changed }}
      k8s_services: ${{ steps.set-flags.outputs.k8s_services }}

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: detect changed modules
        id: set-matrix
        shell: bash
        run: |
          # [1단계] Git 추적
          BEFORE="${{ github.event.before }}"
          # 처음 만든 브랜치인 경우 -> 바로 직전 커밋(HEAD~1)과 비교
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED_FILES=$(git diff --name-only "$BEFORE" ${{ github.sha }})
          fi

          echo "changed files:"
          echo "$CHANGED_FILES"

          MODULES=()

          # [2단계] 폴더별 검사
          if grep -q '^db-migration/' <<< "$CHANGED_FILES"; then
            MODULES+=('{"module_name":"db-migration"}')
          fi

          if grep -q '^service/member/' <<< "$CHANGED_FILES"; then
            MODULES+=('{"module_name":"member"}')
          fi

          if grep -q '^service/product/' <<< "$CHANGED_FILES"; then
            MODULES+=('{"module_name":"product"}')
          fi

          if grep -q '^service/order/' <<< "$CHANGED_FILES"; then
            MODULES+=('{"module_name":"order"}')
          fi

          if grep -q '^service/payment/' <<< "$CHANGED_FILES"; then
            MODULES+=('{"module_name":"payment"}')
          fi

          if grep -q '^service/notification/' <<< "$CHANGED_FILES"; then
            MODULES+=('{"module_name":"notification"}')
          fi

          if grep -q '^service/settlement/' <<< "$CHANGED_FILES"; then
            MODULES+=('{"module_name":"settlement"}')
          fi

          if grep -q '^service/cart/' <<< "$CHANGED_FILES"; then
            MODULES+=('{"module_name":"cart"}')
          fi

          if grep -q '^service/gateway/' <<< "$CHANGED_FILES"; then
            MODULES+=('{"module_name":"gateway"}')
          fi

          if grep -q '^service/ai/' <<< "$CHANGED_FILES"; then
            MODULES+=('{"module_name":"ai"}')
          fi

          if grep -q '^service/auction/' <<< "$CHANGED_FILES"; then
            MODULES+=('{"module_name":"auction"}')
          fi

          # [3단계] 결과 보고 및 포장 
          # 변경된 모듈이 없는 경우 → build job skip
          if [ ${#MODULES[@]} -eq 0 ]; then
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            # matrix 형식(JSON)으로 변환
            JSON=$(printf '%s\n' "${MODULES[@]}" | jq -cs '{include: .}')
            echo 'has_changes=true' >> "$GITHUB_OUTPUT"
            echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          fi

      - name: set changed services  # 배포 대상 필터링 및 청소 작업
        id: set-services
        shell: bash
        run: |
          SERVICES=$(echo '${{ steps.set-matrix.outputs.matrix }}' | jq -r '.include[].module_name | select(. != "db-migration" and . != "discovery" and . != "config")' | tr '\n' ' ' | sed 's/[[:space:]]*$//')
          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"

      - name: set flags # 특정 스위치(flag) 3개를 켜고 끄는 작업
        id: set-flags
        shell: bash
        run: |
          # [1단계] Git 추적
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED_FILES=$(git diff --name-only "$BEFORE" ${{ github.sha }})
          fi

          # [2단계] 1번 스위치 (migration_changed)
          # db-migration 변경 여부를 따로 저장해서 deploy 단계에서 migration 선실행 여부 결정
          if grep -q '^db-migration/' <<< "$CHANGED_FILES"; then
            echo "migration_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "migration_changed=false" >> "$GITHUB_OUTPUT"
          fi

          # [3단계] 2번 스위치 (k8s_changed)
          if grep -q '^infra/k8s/' <<< "$CHANGED_FILES"; then
            echo "k8s_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "k8s_changed=false" >> "$GITHUB_OUTPUT"
          fi

          # [4단계] 3번 스위치 (k3s_services)
          # k8s 서비스 폴더별 변경 감지
          K8S_SERVICES=()
          for service in member product order payment notification settlement cart gateway ai auction; do
            if grep -q "^infra/k8s/$service/" <<< "$CHANGED_FILES"; then
              K8S_SERVICES+=("$service")
            fi
          done
          echo "k8s_services=${K8S_SERVICES[*]}" >> "$GITHUB_OUTPUT"

  build:
    name: build modules
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    # strategy.matrix: 멀티태스킹 병렬 빌드
    strategy:
      fail-fast: false  # 병렬 작업 중 일부 실패 시, 다른 작업은 계속 작업
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }} # matrix.module_name 으로 아래 스텝들을 각가의 runner에서 실행

    steps:
      # [1단계] 소스 코드 빌드 단계
      - name: checkout
        uses: actions/checkout@v4

      - name: setup jdk 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: grant execute permission
        run: chmod +x ./gradlew

      - name: build selected module
        run: ./gradlew :${{ matrix.module_name }}:build

      # [2단계] 도커 포장 및 저장소 업로드 단계
      - name: login to ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # github actions에서 다음 step에서도 쓸 수 있도록 환경변수 등록
      # 긴 커밋 버전 7자리로 줄임
      - name: set short sha
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: build docker image
        run: |
          docker build \
            -t $IMAGE_PREFIX/${{ matrix.module_name }}:latest \
            -t $IMAGE_PREFIX/${{ matrix.module_name }}:sha-$SHORT_SHA \
            -f ./service/${{ matrix.module_name }}/Dockerfile .

      - name: push docker image
        run: |
          docker push $IMAGE_PREFIX/${{ matrix.module_name }}:latest
          docker push $IMAGE_PREFIX/${{ matrix.module_name }}:sha-$SHORT_SHA

  deploy:
    name: deploy
    needs: [ build, detect-changes ]
    # always()로 build가 skipped여도 실행되도록 설정
    # build skipped = 서비스 코드 변경 없음 = k8s 파일만 변경된 경우
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (needs.detect-changes.outputs.has_changes == 'true' || needs.detect-changes.outputs.k8s_changed == 'true')
    runs-on: [self-hosted, linux, x64, ec2, k3s]

    steps:
      - name: checkout
        uses: actions/checkout@v4

      # [1단계] 상태 점검 & name space 적용
      # self-hosted runner에서 k8s 클러스터 접근이 정상인지 확인하는 단계
      # 실패하면 이후 배포를 진행하지 않고 즉시 중단 (환경 문제 조기 감지)
      - name: sanity check
        run: kubectl get nodes

      # goods-mall 네임스페이스가 없으면 생성
      # 이후 모든 리소스가 이 네임스페이스에 배포되므로 가장 먼저 실행
      - name: apply namespace
        run: kubectl apply -f infra/k8s/infra/namespace.yaml

      # [2단계] 암호 문서 셋팅 (Secret 생성)
      # GHCR에서 유료/비공개 이미지를 다운로드할 수 있는 마스터키 배포
      # GHCR private 이미지를 k3s가 pull할 수 있도록 docker-registry 타입 Secret 생성
      # '--dry-run=client -o yaml | kubectl apply -f -' 패턴으로 이미 존재하면 업데이트, 없으면 생성 (멱등)
      - name: apply ghcr pull secret
        run: |
          kubectl create secret docker-registry ghcr-secret -n goods-mall \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_PAT }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # GitHub Secrets에 저장된 민감한 값들을 k8s Secret으로 생성
      # secret.yaml은 git에 올라가지 않으므로 CD에서 직접 생성
      # (DB 비밀번호, 토스페이먼츠 키, OpenAI API 키 등을 쿠버네티스 보안 메모리(Secret)에 등록)
      - name: apply secrets
        run: |
          kubectl create secret generic common-secret -n goods-mall \
            --from-literal=DB_USER_NAME="${{ secrets.DB_USER_NAME }}" \
            --from-literal=DB_USER_PASSWORD="${{ secrets.DB_USER_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic gateway-secret -n goods-mall \
            --from-literal=JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic member-secret -n goods-mall \
            --from-literal=JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
            --from-literal=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY }}" \
            --from-literal=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --from-literal=KAKAO_CLIENT_SECRET="${{ secrets.KAKAO_CLIENT_SECRET }}" \
            --from-literal=SMTP_USERNAME="${{ secrets.SMTP_USERNAME }}" \
            --from-literal=SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
            --from-literal=ACCOUNT_VERIFICATION_SECRET_KEY="${{ secrets.ACCOUNT_VERIFICATION_SECRET_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic auction-secret -n goods-mall \
            --from-literal=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --from-literal=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic product-secret -n goods-mall \
            --from-literal=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --from-literal=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic order-secret -n goods-mall \
            --from-literal=SWEET_TRACKER_API_KEY="${{ secrets.SWEET_TRACKER_API_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic payment-secret -n goods-mall \
            --from-literal=TOSS_PAYMENTS_SECRET_KEY="${{ secrets.TOSS_PAYMENTS_SECRET_KEY }}" \
            --from-literal=PAYMENT_WITHDRAW_CRYPTO_SECRET_KEY="${{ secrets.PAYMENT_WITHDRAW_CRYPTO_SECRET_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic ai-secret -n goods-mall \
            --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # [3단계] 기본 인프라 먼저 깔기
      # postgres, redis, kafka, elasticsearch, ingress 등 인프라 리소스 적용
      # --recursive: infra/k8s/infra/ 하위 모든 yaml 파일 적용
      - name: apply infra
        run: kubectl apply --recursive -f infra/k8s/infra/

      # [4단계] 신호등 제어 - DB 업데이트 먼저!
      # db-migration 파일이 변경된 경우에만 실행
      # k8s Job은 immutable이므로 기존 Job 삭제 후 재생성
      # 완료될 때까지 최대 300초 대기 (서비스 배포 전 마이그레이션 선행 보장)
      - name: run db-migration
        if: needs.detect-changes.outputs.migration_changed == 'true'
        run: |
          kubectl delete job/db-migration -n goods-mall --ignore-not-found
          kubectl apply -f infra/k8s/db-migration/ -n goods-mall
          kubectl wait --for=condition=complete job/db-migration -n goods-mall --timeout=300s

      # [5단계] 바뀐 서비스만 배포
      # 코드 변경 서비스 + k8s 파일 변경 서비스를 합쳐서 해당 서비스 yaml만 적용
      - name: apply changed services
        run: |
          # [1] 명단 수집
          SERVICES="${{ needs.detect-changes.outputs.services }}"
          K8S_SERVICES="${{ needs.detect-changes.outputs.k8s_services }}"
          
          # [2] 중복 제거 및 단일 명단 생성
          ALL_SERVICES=$(echo "$SERVICES $K8S_SERVICES" | tr ' ' '\n' | sort -u | xargs)
          
          # [3] for loop 배포
          if [ -n "$ALL_SERVICES" ]; then
            for service in $ALL_SERVICES; do
              kubectl apply -f infra/k8s/$service/ -n goods-mall
            done
          fi

      # [6단계] 무중단 restart & 살았는지 확인 (rollout restart)
      # :latest 태그는 스펙이 동일해도 새 이미지를 pull하지 않으므로 rollout restart로 강제 재시작
      # rollout status로 Pod가 실제로 정상 기동될 때까지 대기 (최대 300초)
      # 실패 시 CD job도 실패로 표시되어 배포 이상 즉시 감지 가능
      - name: rollout restart changed services
        run: |
          SERVICES="${{ needs.detect-changes.outputs.services }}"
          if [ -n "$SERVICES" ]; then
            for service in $SERVICES; do
              kubectl rollout restart deployment/$service -n goods-mall
              kubectl rollout status deployment/$service -n goods-mall --timeout=300s
            done
          fi
