name: ci

on:
  # dev / master 대상으로 PR 생성 또는 업데이트 시 실행
  pull_request:
    branches:
      - dev
      - master
    paths:
      - "member/**"
      - "product/**"
      - "order/**"
      - "payment/**"
      - "notification/**"
      - "settlement/**"
      - "cart/**"

# 같은 PR에서 새 커밋이 올라오면 이전 실행 취소
concurrency:
  group: ci
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # 변경된 모듈 감지
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest

    # 다음 job에서 사용할 output 값 정의
    outputs:
      has_changes: ${{ steps.set-matrix.outputs.has_changes }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          # PR 기준 비교를 위해 전체 히스토리 가져오기
          fetch-depth: 0

      - name: detect changed modules
        id: set-matrix
        shell: bash
        run: |
          # PR 기준 브랜치와 현재 코드 차이 비교
          git fetch origin ${{ github.base_ref }}
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          # 로그 출력
          echo "changed files:"
          echo "$CHANGED_FILES"
          
          # 변경된 모듈을 담을 배열
          MODULES=()

          if echo "$CHANGED_FILES" | grep -q '^member/'; then
            MODULES+=('{"module_name":"member"}')
          fi

          if echo "$CHANGED_FILES" | grep -q '^product/'; then
            MODULES+=('{"module_name":"product"}')
          fi

          if echo "$CHANGED_FILES" | grep -q '^order/'; then
            MODULES+=('{"module_name":"order"}')
          fi

          if echo "$CHANGED_FILES" | grep -q '^payment/'; then
            MODULES+=('{"module_name":"payment"}')
          fi

          if echo "$CHANGED_FILES" | grep -q '^notification/'; then
            MODULES+=('{"module_name":"notification"}')
          fi

          if echo "$CHANGED_FILES" | grep -q '^settlement/'; then
            MODULES+=('{"module_name":"settlement"}')
          fi
          
          if echo "$CHANGED_FILES" | grep -q '^cart/'; then
          MODULES+=('{"module_name":"cart"}')
          fi
          
          # 변경된 모듈이 없는 경우 → build job skip
          if [ ${#MODULES[@]} -eq 0 ]; then
            echo 'has_changes=false' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          
          else
          # matrix 형식(JSON)으로 변환
            JSON=$(printf '%s\n' "${MODULES[@]}" | jq -cs '{include: .}')
            echo 'has_changes=true' >> "$GITHUB_OUTPUT"
            echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          fi

  # 변경된 모듈만 build 실행
  build:
    name: build modules
    needs: detect-changes
    # 변경된 모듈이 있을 때만 실행
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      # detect-changes에서 만든 matrix 사용
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup jdk 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: grant execute permission
        run: chmod +x ./gradlew

      - name: build selected module
        run: ./gradlew :${{ matrix.module_name }}:build

      - name: build docker image
        run: docker build -t ${{ matrix.module_name }}:ci -f ./${{ matrix.module_name }}/Dockerfile .