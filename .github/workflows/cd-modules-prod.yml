# =========================================================================
# 운영 환경(Production) 변경 모듈 기반 지속적 배포(CD) 파이프라인
# =========================================================================
name: cd-modules-prod

# -------------------------------------------------------------------------
# 배포 트리거 정의 (Trigger Events)
# 1. 자동 배포: main 브랜치에 코드가 푸시(머지)될 때 지정된 경로의 변경이 있으면 동작
# 2. 수동 배포: workflow_dispatch를 통해 깃허브 UI에서 옵션을 지정하여 수동 실행 가능
# -------------------------------------------------------------------------
on:
  push:
    branches:
      - main
    paths:
      - "service/**"
      - "db-migration/**"
      - "common-security/**"
      - "common-monitoring/**"
      - "infra/k8s/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradle/**"
      - "scripts/detect-changed-modules.sh"
      - ".github/workflows/cd-modules-prod.yml"
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Git ref or SHA to diff from"
        required: true
        default: "HEAD~1"
      deploy_infra:
        description: "Apply infra manifests"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - true
          - false
      run_migration:
        description: "Run db-migration job"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - true
          - false

# -------------------------------------------------------------------------
# 동시 배포 제어 (Concurrency)
# - 동일한 배포 그룹에서 중복 실행이 일어나더라도 기존 배포를 취소하지 않고(false)
#   순차적으로 큐에 대기시켜 배포 중 상태 꼬임이나 무중단 배포 실패를 방지합니다.
# -------------------------------------------------------------------------
concurrency:
  group: cd-modules-prod
  cancel-in-progress: false

# -------------------------------------------------------------------------
# 권한 설정 (Permissions)
# - 소스코드 읽기 및 GitHub Packages(GHCR)에 컨테이너 이미지를 푸시하기 위한 권한
# -------------------------------------------------------------------------
permissions:
  contents: read
  packages: write

# -------------------------------------------------------------------------
# 전역 환경 변수 (Global Environments)
# -------------------------------------------------------------------------
env:
  IMAGE_PREFIX: ${{ vars.PROD_IMAGE_PREFIX || 'ghcr.io/sihoney/goodsmall-be' }}
  NAMESPACE: goods-mall

jobs:
  # =======================================================================
  # JOB 1: 변경 모듈 및 배포 대상 감지 (Detect Changes)
  # =======================================================================
  detect-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest

    # 다른 후속 Job(build, deploy)에서 조건문 및 매트릭스로 참조할 결과 정의
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      matrix: ${{ steps.detect.outputs.matrix }}
      services: ${{ steps.detect.outputs.services }}
      deploy_services: ${{ steps.detect.outputs.deploy_services }}
      migration_changed: ${{ steps.detect.outputs.migration_changed }}
      infra_changed: ${{ steps.detect.outputs.infra_changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 실행 주체(자동 푸시 vs 수동 디스패치)에 따라 비교 대상 BASE_REF를 동적으로 결정하여 스크립트 실행
      - name: Detect changed modules
        id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BASE_REF="${{ inputs.base_ref }}"
          else
            BASE_REF="${{ github.event.before }}"
          fi

          bash scripts/detect-changed-modules.sh "$BASE_REF" "${{ github.sha }}"

      - name: Summary
        shell: bash
        run: |
          {
            echo "## Production deployment plan"
            echo ""
            echo "- image prefix: \`$IMAGE_PREFIX\`"
            echo "- build matrix: \`${{ steps.detect.outputs.matrix }}\`"
            echo "- services with code changes: \`${{ steps.detect.outputs.services }}\`"
            echo "- services to deploy: \`${{ steps.detect.outputs.deploy_services }}\`"
            echo "- migration changed: \`${{ steps.detect.outputs.migration_changed }}\`"
            echo "- infra changed: \`${{ steps.detect.outputs.infra_changed }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # =======================================================================
  # JOB 2: 도커 이미지 빌드 및 푸시 (Build and Push)
  # - 1단계 매트릭스 결과를 수신하여 코드가 변경된 모듈들만 병렬로 Dockerizing 수행
  # =======================================================================
  build-and-push:
    name: Build and push images
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build selected module
        run: ./gradlew :${{ matrix.module_name }}:build

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # 빌드 컨텍스트 판정: 이미지 태그용 7자리 고유 SHA 변수를 추출하고, 모듈 타입에 맞는 Dockerfile 경로 탐색
      - name: Set image metadata
        shell: bash
        run: |
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"

          if [ "${{ matrix.module_name }}" = "db-migration" ]; then
            echo "DOCKERFILE=./db-migration/Dockerfile" >> "$GITHUB_ENV"
          else
            echo "DOCKERFILE=./service/${{ matrix.module_name }}/Dockerfile" >> "$GITHUB_ENV"
          fi

      # 무중단 배포 시 고유 식별을 위해 가동중인 롤링업데이트용 sha-공역 태그와 최신화용 latest 태그를 동시 생성
      - name: Build docker image
        run: |
          docker build \
            -t "$IMAGE_PREFIX/${{ matrix.module_name }}:latest" \
            -t "$IMAGE_PREFIX/${{ matrix.module_name }}:sha-$SHORT_SHA" \
            -f "$DOCKERFILE" .

      - name: Push docker image
        run: |
          docker push "$IMAGE_PREFIX/${{ matrix.module_name }}:latest"
          docker push "$IMAGE_PREFIX/${{ matrix.module_name }}:sha-$SHORT_SHA"

  # =======================================================================
  # JOB 3: 쿠버네티스 실서버 반영 및 배포 (Deploy to Production k8s)
  # - 사내망 혹은 가상환경 내부와 연동된 self-hosted 러너를 활용해 kubectl 명령 수행
  # =======================================================================
  deploy:
    name: Deploy changed modules to production
    needs:
      - detect-changes
      - build-and-push
    # 앞선 빌드가 스킵되었더라도(매니페스트만 변경된 경우 등) 배포 단계는 실행되어야 하므로 복잡한 status 조건문 처리
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') &&
      (
        needs.detect-changes.outputs.has_changes == 'true' ||
        needs.detect-changes.outputs.deploy_services != '' ||
        needs.detect-changes.outputs.infra_changed == 'true'
      )
    runs-on: [self-hosted, Linux, X64]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short sha
        shell: bash
        run: |
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-7)"
          echo "SHORT_SHA=$SHORT_SHA" >> "$GITHUB_ENV"

      - name: Sanity check
        run: kubectl get nodes

      - name: Apply namespace
        run: kubectl apply -f infra/k8s/infra/namespace.yaml

      # [Kubernetes 인증 정보 주입 단계]
      # --dry-run=client -o yaml | kubectl apply -f - 방식을 사용하여 
      # 이미 Secret이 존재하더라도 에러를 내지 않고 멱등성(Idempotency) 있게 갱신 적용합니다.
      - name: Apply GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-secret -n "$NAMESPACE" \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GHCR_PAT }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply production secrets
        run: |
          kubectl create secret generic common-secret -n "$NAMESPACE" \
            --from-literal=DB_USER_NAME="${{ secrets.DB_USER_NAME }}" \
            --from-literal=DB_USER_PASSWORD="${{ secrets.DB_USER_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic gateway-secret -n "$NAMESPACE" \
            --from-literal=JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic member-secret -n "$NAMESPACE" \
            --from-literal=JWT_SECRET_KEY="${{ secrets.JWT_SECRET_KEY }}" \
            --from-literal=AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY }}" \
            --from-literal=AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --from-literal=KAKAO_CLIENT_SECRET="${{ secrets.KAKAO_CLIENT_SECRET }}" \
            --from-literal=GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --from-literal=GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --from-literal=SMTP_USERNAME="${{ secrets.SMTP_USERNAME }}" \
            --from-literal=SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
            --from-literal=ACCOUNT_VERIFICATION_SECRET_KEY="${{ secrets.ACCOUNT_VERIFICATION_SECRET_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic auction-secret -n "$NAMESPACE" \
            --from-literal=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --from-literal=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic product-secret -n "$NAMESPACE" \
            --from-literal=AWS_ACCESS_KEY="${{ secrets.AWS_ACCESS_KEY }}" \
            --from-literal=AWS_SECRET_KEY="${{ secrets.AWS_SECRET_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # [공통 인프라 변경 제어] 자동 감지 플래그 혹은 수동 디스패치 입력에 기반해 인프라 반영 플래그 판정
      - name: Decide infra apply
        id: infra
        shell: bash
        run: |
          SHOULD_APPLY="${{ needs.detect-changes.outputs.infra_changed }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.deploy_infra }}" = "true" ]; then
              SHOULD_APPLY=true
            elif [ "${{ inputs.deploy_infra }}" = "false" ]; then
              SHOULD_APPLY=false
            fi
          fi
          echo "should_apply=$SHOULD_APPLY" >> "$GITHUB_OUTPUT"

      - name: Apply infra
        if: steps.infra.outputs.should_apply == 'true'
        run: kubectl apply --recursive -f infra/k8s/infra/

      # [DB 마이그레이션 제어] 수동 오버라이딩 옵션을 조율하여 마이그레이션 실행 플래그 판정
      - name: Decide migration run
        id: migration
        shell: bash
        run: |
          SHOULD_RUN="${{ needs.detect-changes.outputs.migration_changed }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.run_migration }}" = "true" ]; then
              SHOULD_RUN=true
            elif [ "${{ inputs.run_migration }}" = "false" ]; then
              SHOULD_RUN=false
            fi
          fi
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

      # 정식 서비스 컨테이너들이 배포되기 전, 새 버전 스키마를 선반영하기 위해 쿠버네티스 Job을 우선 실행 및 완료 대기(wait)
      - name: Run db migration
        if: steps.migration.outputs.should_run == 'true'
        run: |
          kubectl delete job/db-migration -n "$NAMESPACE" --ignore-not-found
          kubectl set image -f infra/k8s/db-migration/job.yaml db-migration="$IMAGE_PREFIX/db-migration:sha-$SHORT_SHA" --local -o yaml | kubectl apply -n "$NAMESPACE" -f -
          kubectl wait --for=condition=complete job/db-migration -n "$NAMESPACE" --timeout=300s

      # 소스 코드 변경 외에 k8s 구조적 명세(매니페스트) 변경이 발생한 대상 서비스들의 선언형 명세 일괄 동기화
      - name: Apply changed service manifests
        shell: bash
        run: |
          DEPLOY_SERVICES="${{ needs.detect-changes.outputs.deploy_services }}"
          if [ -n "$DEPLOY_SERVICES" ]; then
            for service in $DEPLOY_SERVICES; do
              kubectl apply -f "infra/k8s/$service/" -n "$NAMESPACE"
            done
          fi

      # 애플리케이션 소스 코드 변경이 식별된 서비스들을 대상으로 새로운 커밋 기반 고유 태그(SHA) 이미지로 교체 후 무중단 롤아웃 확인
      - name: Update images and wait for rollout
        shell: bash
        run: |
          SERVICES="${{ needs.detect-changes.outputs.services }}"
          if [ -n "$SERVICES" ]; then
            for service in $SERVICES; do
              kubectl set image "deployment/$service" "$service=$IMAGE_PREFIX/$service:sha-$SHORT_SHA" -n "$NAMESPACE"
              kubectl rollout status "deployment/$service" -n "$NAMESPACE" --timeout=300s
            done
          fi

      # 소스 코드는 그대로이나 쿠버네티스 설정 파일(ConfigMap, 환경 변수, 리소스 등)만 변경된 서비스들을 위해 안전하게 재시작 처리
      - name: Restart k8s-only changed services
        shell: bash
        run: |
          CODE_SERVICES=" ${{ needs.detect-changes.outputs.services }} "
          DEPLOY_SERVICES="${{ needs.detect-changes.outputs.deploy_services }}"

          if [ -n "$DEPLOY_SERVICES" ]; then
            for service in $DEPLOY_SERVICES; do
              if [[ "$CODE_SERVICES" != *" $service "* ]]; then
                kubectl rollout restart "deployment/$service" -n "$NAMESPACE"
                kubectl rollout status "deployment/$service" -n "$NAMESPACE" --timeout=300s
              fi
            done
          fi

      - name: Deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Production deployment result"
            echo ""
            echo "- image tag: \`sha-$SHORT_SHA\`"
            echo "- services with image updates: \`${{ needs.detect-changes.outputs.services }}\`"
            echo "- services with manifest apply: \`${{ needs.detect-changes.outputs.deploy_services }}\`"
            echo "- migration run: \`${{ steps.migration.outputs.should_run }}\`"
            echo "- infra applied: \`${{ steps.infra.outputs.should_apply }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          kubectl get pods -n "$NAMESPACE" -o wide
