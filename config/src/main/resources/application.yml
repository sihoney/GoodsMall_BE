server:
    port: 8888

spring:
    application:
        name: config-service
    profiles:
        active: native
    cloud:
        config:
            server:
                native:
                    search-locations: classpath:/configs

eureka:
    client:
        service-url:
            defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
