# ==============================
# Payment Service - Docker 환경 설정
# Config Server (native profile)에서 제공
# ==============================

# --- 데이터베이스 설정 ---
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USER_NAME}
    password: ${DB_USER_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: payment

  # --- Kafka 설정 ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.payment.infrastructure.messaging.kafka.contract

# --- 서버 포트 ---
server:
  port: 8082

# --- Eureka 서비스 등록 설정 ---
eureka:
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP:127.0.0.1}
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

# --- Springdoc 설정 ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# --- Toss Payments 설정 ---
toss:
  payments:
    base-url: ${TOSS_PAYMENTS_BASE_URL:https://api.tosspayments.com}
    client-key: ${TOSS_PAYMENTS_CLIENT_KEY}
    secret-key: ${TOSS_PAYMENTS_SECRET_KEY}
    success-url: ${TOSS_PAYMENTS_SUCCESS_URL}
    fail-url: ${TOSS_PAYMENTS_FAIL_URL}
    widget-enabled: ${TOSS_PAYMENTS_WIDGET_ENABLED:true}

# --- Payment Kafka Topic/Consumer Group 설정 ---
payment:
  kafka:
    topics:
      member-created: ${PAYMENT_KAFKA_TOPIC_MEMBER_CREATED:member-signed-up}
      order-payment-result: ${PAYMENT_KAFKA_TOPIC_ORDER_PAYMENT_RESULT:payment.order-payment-result}
      order-delivery-completed: ${PAYMENT_KAFKA_TOPIC_ORDER_DELIVERY_COMPLETED:order.delivery-completed}
      order-purchase-confirmed: ${PAYMENT_KAFKA_TOPIC_ORDER_PURCHASE_CONFIRMED:order.purchase-confirmed}
      settlement-candidate-created: ${PAYMENT_KAFKA_TOPIC_SETTLEMENT_CANDIDATE_CREATED:payment.settlement-candidate-created}
      settlement-payout-requested: ${PAYMENT_KAFKA_TOPIC_SETTLEMENT_PAYOUT_REQUESTED:settlement.seller-payout-requested}
      settlement-payout-result: ${PAYMENT_KAFKA_TOPIC_SETTLEMENT_PAYOUT_RESULT:payment.seller-payout-result}
      auto-purchase-confirmed: ${PAYMENT_KAFKA_TOPIC_AUTO_PURCHASE_CONFIRMED:payment.auto-purchase-confirmed}
    consumer-groups:
      member-created: ${PAYMENT_KAFKA_CONSUMER_GROUP_MEMBER_CREATED:payment-service}
      order-delivery-completed: ${PAYMENT_KAFKA_CONSUMER_GROUP_ORDER_DELIVERY_COMPLETED:payment-service}
      order-purchase-confirmed: ${PAYMENT_KAFKA_CONSUMER_GROUP_ORDER_PURCHASE_CONFIRMED:payment-service}
      settlement-payout-requested: ${PAYMENT_KAFKA_CONSUMER_GROUP_SETTLEMENT_PAYOUT_REQUESTED:payment-service}
    retry:
      settlement-payout-requested:
        dlq-topic: ${PAYMENT_KAFKA_RETRY_SETTLEMENT_PAYOUT_REQUESTED_DLQ_TOPIC:settlement.seller-payout-requested.dlq}
        initial-interval-ms: ${PAYMENT_KAFKA_RETRY_SETTLEMENT_PAYOUT_REQUESTED_INITIAL_INTERVAL_MS:1000}
        multiplier: ${PAYMENT_KAFKA_RETRY_SETTLEMENT_PAYOUT_REQUESTED_MULTIPLIER:2.0}
        max-interval-ms: ${PAYMENT_KAFKA_RETRY_SETTLEMENT_PAYOUT_REQUESTED_MAX_INTERVAL_MS:10000}
        max-retries: ${PAYMENT_KAFKA_RETRY_SETTLEMENT_PAYOUT_REQUESTED_MAX_RETRIES:3}
  escrow:
    auto-release:
      fixed-delay-ms: ${PAYMENT_ESCROW_AUTO_RELEASE_FIXED_DELAY_MS:60000}

# --- 로깅 설정 ---
logging:
  level:
    com.example.payment: INFO
    org.hibernate.SQL: WARN
