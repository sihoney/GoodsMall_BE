# ==============================
# Auction Service - Docker 환경 설정
# Config Server (native profile)에서 제공
# 파일명이 spring.application.name과 일치해야 자동으로 매핑됨
# ==============================

# --- 데이터베이스 설정 ---
# 공유 DB(goods_mall)에 접속, default_schema로 auction 스키마 격리
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/goods_mall}
    username: ${DB_USER_NAME:postgres}
    password: ${DB_USER_PASSWORD:post1234}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: auction

  # --- Kafka 설정 ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# --- 서버 포트 ---
server:
  port: 8090

# --- Eureka 서비스 등록 설정 ---
# Docker 컨테이너 환경에서는 IP 기반 등록 필요 (호스트명이 랜덤 ID이므로)
eureka:
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP:127.0.0.1}
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

# --- AWS S3 설정 ---
cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ap-northeast-2
    s3:
      bucket: ${AWS_S3_BUCKET}

  # --- Elasticsearch 설정 ---
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://elasticsearch:9200}

# --- Auction Kafka Topic 설정 ---
auction:
  kafka:
    topic:
      auction-changed: ${AUCTION_CHANGED_TOPIC:auction.changed}

# --- 로깅 설정 ---
# Docker 환경에서는 INFO/WARN 레벨 (로컬은 DEBUG)
logging:
  level:
    com.todaylunch.auction: INFO
    org.hibernate.SQL: WARN
