# ==============================
# Settlement Service - Docker 환경 설정
# Config Server (native profile)에서 제공
# ==============================

# --- 데이터베이스 설정 ---
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USER_NAME}
    password: ${DB_USER_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: settlement

  # --- Kafka 설정 ---
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: com.example.settlement.infrastructure.messaging.kafka.contract

# --- 서버 포트 ---
server:
  port: 8085

# --- Eureka 서비스 등록 설정 ---
eureka:
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP:127.0.0.1}
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

# --- Springdoc 설정 ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

# --- Settlement Batch 설정 ---
settlement:
  batch:
    monthly-aggregation:
      cron: ${SETTLEMENT_BATCH_MONTHLY_AGGREGATION_CRON:0 5 3 1 * *}
      zone: ${SETTLEMENT_BATCH_MONTHLY_AGGREGATION_ZONE:Asia/Seoul}
    retryable-failed-payout:
      cron: ${SETTLEMENT_BATCH_RETRYABLE_FAILED_PAYOUT_CRON:0 */10 * * * *}
      zone: ${SETTLEMENT_BATCH_RETRYABLE_FAILED_PAYOUT_ZONE:Asia/Seoul}

# --- 로깅 설정 ---
logging:
  level:
    com.example.settlement: INFO
    org.hibernate.SQL: WARN
