# ==============================
# AI Service - Docker 환경 설정
# Config Server (native profile)에서 제공
# ==============================

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USER_NAME}
    password: ${DB_USER_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ai
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

server:
  port: 8088

eureka:
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP:127.0.0.1}
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

ai:
  embedding:
    model: ${AI_EMBEDDING_MODEL:text-embedding-3-small}
    openai-api-key: ${OPENAI_API_KEY:}
    openai-base-url: ${PROJECT_OPENAI_BASE_URL:https://api.openai.com}
  recommendation:
    rerank:
      enabled: ${AI_RECOMMENDATION_RERANK_ENABLED:false}
      model: ${AI_RECOMMENDATION_RERANK_MODEL:gpt-5.4-nano}
      openai-api-key: ${OPENAI_API_KEY:}
      openai-base-url: ${PROJECT_OPENAI_BASE_URL:https://api.openai.com}
      temperature: ${AI_RECOMMENDATION_RERANK_TEMPERATURE:0.0}
      connect-timeout-ms: ${AI_RECOMMENDATION_RERANK_CONNECT_TIMEOUT_MS:1500}
      read-timeout-ms: ${AI_RECOMMENDATION_RERANK_READ_TIMEOUT_MS:2500}
  cache:
    recommendation-ttl-seconds: ${AI_RECOMMENDATION_CACHE_TTL_SECONDS:600}
  event:
    idempotency-ttl-seconds: ${AI_EVENT_IDEMPOTENCY_TTL_SECONDS:259200}

logging:
  level:
    com.example.ai: INFO
    org.hibernate.SQL: WARN
