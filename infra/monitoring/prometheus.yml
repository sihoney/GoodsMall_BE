global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: auction-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8090
    labels:
      service: auction

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
