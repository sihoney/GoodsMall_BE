name: goods-mall

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: goods-mall-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-goods_mall}
      POSTGRES_USER: ${DB_USER_NAME:-goods}
      POSTGRES_PASSWORD: ${DB_USER_PASSWORD:-change-me}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      TZ: Asia/Seoul
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - goods_mall_postgres_data:/var/lib/postgresql
      # 스키마 기준은 Flyway로 단일화합니다. seed SQL은 로컬 테스트 시 수동 실행용으로만 사용합니다.
      - ../../db-migration/src/main/resources/db/seed/dev_seed_payment_settlement.sql:/opt/seed/dev_seed_payment_settlement.sql:ro

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: goods-mall-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: goods-mall-kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: goods-mall-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8089:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"

  redis:
    image: redis:7.4-alpine
    container_name: goods-mall-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    build:
      context: ../..
      dockerfile: service/product/docker/elasticsearch/Dockerfile
    container_name: goods-mall-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"

  db-migration:
    build:
      context: ../..
      dockerfile: db-migration/Dockerfile
    container_name: goods-mall-db-migration
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/goods_mall
      DB_USER_NAME: ${DB_USER_NAME}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD}
      DB_SEED_ENABLED: "true"
      DB_SEED_LOCATIONS: classpath:db/seed/dev_seed_member.sql,classpath:db/seed/dev_seed_category.sql,classpath:db/seed/dev_seed_product.sql,classpath:db/seed/dev_seed_couriers.sql,classpath:db/seed/dev_seed_cart.sql,classpath:db/seed/dev_seed_wallet.sql,classpath:db/seed/dev_seed_payment_settlement.sql
    restart: "no"

  payment:
    build:
      context: ../..
      dockerfile: service/payment/Dockerfile
    container_name: goods-mall-payment
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/goods_mall
      DB_USER_NAME: ${DB_USER_NAME}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TOSS_PAYMENTS_BASE_URL: ${TOSS_PAYMENTS_BASE_URL}
      TOSS_PAYMENTS_CLIENT_KEY: ${TOSS_PAYMENTS_CLIENT_KEY}
      TOSS_PAYMENTS_SECRET_KEY: ${TOSS_PAYMENTS_SECRET_KEY}
    ports:
      - "8082:8082"

  settlement:
    build:
      context: ../..
      dockerfile: service/settlement/Dockerfile
    container_name: goods-mall-settlement
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/goods_mall
      DB_USER_NAME: ${DB_USER_NAME}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8085:8085"

  gateway:
    build:
      context: ../..
      dockerfile: service/gateway/Dockerfile
    container_name: goods-mall-gateway
    env_file:
      - ../../.env
    environment:
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "8080:8080"

  member:
    build:
      context: ../..
      dockerfile: service/member/Dockerfile
    container_name: goods-mall-member
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://postgres:5432/goods_mall
      DB_USER_NAME: ${DB_USER_NAME}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_KEY}
      API_GATEWAY_HOST: http://gateway:8080
      EMAIL_PROVIDER: ${EMAIL_PROVIDER}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      MAIL_FROM: no-reply@todaylunch.local
      MAIL_FROM_NAME: TodayLunch
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
    ports:
      - "8083:8083"

  product:
    build:
      context: ../..
      dockerfile: service/product/Dockerfile
    container_name: goods-mall-product
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/goods_mall
      DB_USER_NAME: ${DB_USER_NAME}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
    ports:
      - "8081:8081"

  cart:
    build:
      context: ../..
      dockerfile: service/cart/Dockerfile
    container_name: goods-mall-cart
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/goods_mall
      DB_USER_NAME: ${DB_USER_NAME}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD}
    ports:
      - "8086:8086"

  order:
    build:
      context: ../..
      dockerfile: service/order/Dockerfile
    container_name: goods-mall-order
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/goods_mall
      DB_USER_NAME: ${DB_USER_NAME}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8084:8084"

  notification:
    build:
      context: ../..
      dockerfile: service/notification/Dockerfile
    container_name: goods-mall-notification
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/goods_mall
      DB_USER_NAME: ${DB_USER_NAME}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8087:8087"

  auction:
    build:
      context: ../..
      dockerfile: service/auction/Dockerfile
    container_name: goods-mall-auction
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/goods_mall
      DB_USER_NAME: ${DB_USER_NAME}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8090:8090"

  ai:
    build:
      context: ../..
      dockerfile: service/ai/Dockerfile
    container_name: goods-mall-ai
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/goods_mall
      DB_USER_NAME: ${DB_USER_NAME}
      DB_USER_PASSWORD: ${DB_USER_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      AI_PRODUCT_API_BASE_URL: ${AI_PRODUCT_API_BASE_URL:-http://product:8081}
      AI_PRODUCT_API_PAGE_SIZE: ${AI_PRODUCT_API_PAGE_SIZE:-200}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
        # Legacy: Eureka / Config Server 구성 흔적. 현재는 사용하지 않음.
        # EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE}
        # EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
        # EUREKA_INSTANCE_HOSTNAME: ai
        # CONFIG_SERVER_URL: http://config:8888
    ports:
      - "8088:8088"

volumes:
  goods_mall_postgres_data:
