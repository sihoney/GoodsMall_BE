apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-auth-rules-config
  namespace: goods-mall
data:
  gateway-auth-rules.yml: |
    gateway:
      auth:
        jwt-validation-enabled: ${GATEWAY_JWT_VALIDATION_ENABLED:true}
        public-rules:
          - methods: [POST]
            pattern: /api/auth/login
          - methods: [POST]
            pattern: /api/auth/refresh
          - methods: [POST]
            pattern: /api/auth/password-resets
          - methods: [POST]
            pattern: /api/auth/password-resets/confirm
          - methods: [GET]
            pattern: /api/auth/oauth/kakao/authorize
          - methods: [GET]
            pattern: /api/auth/oauth/kakao/callback
          - methods: [GET]
            pattern: /api/auth/oauth/google/authorize
          - methods: [GET]
            pattern: /api/auth/oauth/google/callback
          - methods: [POST]
            pattern: /api/auth/email-verifications
          - methods: [POST]
            pattern: /api/auth/email-verifications/confirm
          - methods: [POST]
            pattern: /api/auth/email-verifications/auto-login
          - methods: [POST]
            pattern: /api/auth/profile-images/presign
          - methods: [GET]
            pattern: /api/auctions/ws
          - methods: [GET]
            pattern: /swagger/**
          - methods: [GET]
            pattern: /swagger-ui.html
          - methods: [POST]
            pattern: /api/members
          - methods: [GET]
            pattern: /api/members/**
          - methods: [GET]
            pattern: /api/category/**
          - methods: [GET]
            pattern: /api/categories/**
          - methods: [GET]
            pattern: /api/products/**
          - methods: [GET]
            pattern: /api/ai/**
          - methods: [GET]
            pattern: /api/auctions/**
        role-rules:
          - methods: [GET, PUT, PATCH, DELETE]
            pattern: /api/members/me
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [PATCH]
            pattern: /api/members/me/password
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [GET, POST]
            pattern: /api/members/me/account-verifications/**
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [GET, DELETE]
            pattern: /api/members/me/oauth-accounts/**
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [POST]
            pattern: /api/auth/logout/**
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [GET, DELETE]
            pattern: /api/auth/sessions/**
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [GET]
            pattern: /api/auth/oauth/kakao/link/authorize
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [GET]
            pattern: /api/auth/oauth/kakao/link/authorize-url
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [POST]
            pattern: /api/auth/oauth/kakao/link
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [POST, GET]
            pattern: /api/member-reports/**
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [GET, PATCH]
            pattern: /api/notifications/**
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [GET, POST, PUT, PATCH, DELETE]
            pattern: /api/carts/**
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [GET, POST, DELETE]
            pattern: /api/wishes/**
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [GET, POST]
            pattern: /api/orders/**
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [GET]
            pattern: /api/deliveries/seller/**
            allowed-roles: [SELLER, ADMIN]
          - methods: [GET]
            pattern: /api/deliveries/seller
            allowed-roles: [SELLER, ADMIN]
          - methods: [POST]
            pattern: /api/deliveries/*/ship
            allowed-roles: [SELLER, ADMIN]
          - methods: [GET]
            pattern: /api/deliveries/**
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [GET, POST]
            pattern: /api/return-requests/**
            allowed-roles: [SELLER, ADMIN]
          - methods: [GET, POST]
            pattern: /api/payments/**
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [POST]
            pattern: /api/auctions/*/bids
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [POST]
            pattern: /api/auctions
            allowed-roles: [SELLER, ADMIN]
          - methods: [POST, GET, PUT]
            pattern: /api/sellers/**
            allowed-roles: [SELLER, ADMIN]
          - methods: [POST]
            pattern: /api/sellers/register
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [GET]
            pattern: /api/products/seller
            allowed-roles: [SELLER, ADMIN]
          - methods: [POST, PUT, PATCH, DELETE]
            pattern: /api/products/**
            allowed-roles: [SELLER, ADMIN]
          - methods: [POST]
            pattern: /api/categories/admin
            allowed-roles: [ADMIN]
          - methods: [PUT]
            pattern: /api/categories/admin/**
            allowed-roles: [ADMIN]
          - methods: [POST, PUT]
            pattern: /api/categories/**
            allowed-roles: [SELLER, ADMIN]
          - methods: [DELETE]
            pattern: /api/categories/**
            allowed-roles: [ADMIN]
          - methods: [POST, GET]
            pattern: /api/settlements/**
            allowed-roles: [SELLER, ADMIN]
          - methods: [POST]
            pattern: /api/ai/admin/**
            allowed-roles: [ADMIN]
          - methods: [POST]
            pattern: /api/admin/products/**
            allowed-roles: [ADMIN]
          - methods: [GET, PATCH]
            pattern: /api/admin/member-reports/**
            allowed-roles: [ADMIN]
          - methods: [POST, PATCH, GET]
            pattern: /api/admin/member-restrictions/**
            allowed-roles: [ADMIN]
          - methods: [POST]
            pattern: /api/ai/admin/**
            allowed-roles: [ADMIN]
          - methods: [POST]
            pattern: /api/ai/assist/**
            allowed-roles: [SELLER, ADMIN]
          - methods: [POST]
            pattern: /api/ai/auction-price-recommendation
            allowed-roles: [USER, SELLER, ADMIN]
          - methods: [GET]
            pattern: /api/ai/recommendations/me
            allowed-roles: [USER, SELLER, ADMIN]
