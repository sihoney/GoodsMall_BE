apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai
  namespace: goods-mall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai
  template:
    metadata:
      labels:
        app: ai
    spec:
      nodeSelector:
        role: infra
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: ai
          image: ghcr.io/prgrms-be-adv-devcourse/beadv5_2_todaylunchmenu_be/ai:latest
          ports:
            - containerPort: 8088
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Xms192m -Xmx384m -Duser.timezone=Asia/Seoul"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          envFrom:
            - configMapRef:
                name: common-config
            - secretRef:
                name: common-secret
            - configMapRef:
                name: ai-config
            - secretRef:
                name: ai-secret
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8088
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8088
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
